
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdCat - AI Ad Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/tailwind-custom.css">
  <script src="demo-setup.js"></script>

<body class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50">
  <div class="container mx-auto px-6 py-24 max-w-4xl">
    <div class="text-center mb-20 animate-fade-in">
      <h1 class="text-6xl md:text-7xl font-black bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent mb-6 leading-tight">
        AI-Powered Ad<br>Generation
      </h1>
      <p class="text-xl md:text-2xl text-gray-600 max-w-2xl mx-auto mb-12 leading-relaxed">
        Paste a product URL. Get stunning ads in seconds. No design skills needed.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-12">
        <a href="dashboard.html" class="btn-gradient glass-border ripple px-12 py-6 rounded-3xl text-xl font-bold shadow-2xl hover:shadow-glow bg-white text-slate-900 hover:bg-slate-100 animate-bounce w-full sm:w-auto">
          🚀 Enter Dashboard
        </a>
        <a href="demo-setup.js" class="text-gray-600 hover:text-gray-900 font-medium transition-all hover:scale-105 text-sm bg-white/50 backdrop-blur-sm px-8 py-4 rounded-2xl border border-gray-200">
          ⚙️ Setup Demo Login
        </a>
      </div>
      <div class="grid grid-cols-3 gap-8 mt-20 text-center">
        <div class="group p-premium rounded-premium hover:bg-blue-50/50 backdrop-blur-sm transition-all hover-lift">
          <div class="text-4xl font-black gradient-text group-hover:scale-110 mb-4">10K+</div>
          <div class="text-gray-600 font-medium">Ads Generated</div>
        </div>
        <div class="group p-premium rounded-premium hover:bg-indigo-50/50 backdrop-blur-sm transition-all hover-lift">
          <div class="text-4xl font-black gradient-text group-hover:scale-110 mb-4">500+</div>
          <div class="text-gray-600 font-medium">Happy Users</div>
        </div>
        <div class="group p-premium rounded-premium hover:bg-cyan-50/50 backdrop-blur-sm transition-all hover-lift">
          <div class="text-4xl font-black gradient-text group-hover:scale-110 mb-4">98%</div>
          <div class="text-gray-600 font-medium">Success Rate</div>
      </div>
    </div>
  </div>

</html>
