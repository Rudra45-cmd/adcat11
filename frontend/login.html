<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In — AdCat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-root">
    <div class="auth-card" role="region" aria-labelledby="auth-heading">
      <div class="auth-brand">
        <div class="logo-mark" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="36" height="36" rx="8" fill="none" stroke="#D4AF37" stroke-width="1.6" />
            <path d="M14 30 L22 18 L30 30" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1 id="auth-heading">Welcome Back</h1>
          <p class="muted">Sign in to access your AdCat dashboard and start creating premium ads.</p>
        </div>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required>
          <div class="field-meta" aria-live="polite"></div>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
          <div class="field-meta" aria-live="polite"></div>
        </div>

        <div class="form-actions">
          <button class="btn btn-gold-filled btn-luxury-gold btn-auth" type="submit">Sign In</button>
        </div>

        <div class="form-footer">
          <a href="#" class="link-soft">Forgot password?</a>
          <span class="muted">•</span>
          <a href="signup.html" class="link-soft">Create an account</a>
        </div>
      </form>

      <p class="auth-note muted">By continuing you agree to AdCat's <a href="#" class="link-soft">Terms</a> and <a href="#" class="link-soft">Privacy</a>.</p>
    </div>
  </main>

  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/auth-ui.js" defer></script>
</body>
</html>
