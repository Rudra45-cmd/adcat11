<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AdCat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container fade-in">
      <aside class="auth-left">
        <span class="shape s1" aria-hidden="true"></span>
        <span class="shape s2" aria-hidden="true"></span>
        <span class="shape s3" aria-hidden="true"></span>

        <div>
          <a href="index.html" class="logo" style="color: #fff">AdCat</a>
        </div>

        <div>
          <h1>Build ads faster with AI</h1>
          <p>Create, test, and optimize ad campaigns with one premium workflow.</p>
        </div>
      </aside>

      <section class="auth-right">
        <form class="glass-form" action="#" method="post">
          <div class="form-head">
            <h2>Welcome back</h2>
            <p>Sign in to continue to your AdCat dashboard.</p>
          </div>

          <div class="form-grid">
            <label>
              Email
              <input type="email" name="email" placeholder="you@company.com" required />
            </label>

            <label>
              Password
              <input type="password" name="password" placeholder="••••••••" required />
            </label>

            <div class="forgot"><a href="#">Forgot password?</a></div>

            <button class="btn btn-primary btn-block" type="submit">Log In</button>
            <button class="btn social-btn" type="button">Continue with Google</button>
          </div>

          <p class="helper">Don’t have an account? <a href="signup.html">Create one</a></p>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
