<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AdCat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="bg-blobs" aria-hidden="true">
      <span class="blob pink"></span>
      <span class="blob blue"></span>
      <span class="blob purple"></span>
    </div>

    <main class="container auth-wrap fade-in">
      <section class="auth-glass">
        <a href="index.html" class="logo">Ad<span>Cat</span></a>
        <h1>Welcome Back</h1>
        <p class="subtext">Sign in and continue building high-performing ads.</p>

        <form class="auth-form" action="#" method="post">
          <label>
            Email
            <input type="email" placeholder="you@company.com" required />
          </label>

          <label>
            Password
            <input type="password" placeholder="••••••••" required />
          </label>

          <div class="auth-row">
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-glass btn-primary btn-block">Login</button>
          <button type="button" class="btn btn-glass btn-outline btn-block">Continue with Google</button>
        </form>

        <p class="switch-link">Don’t have an account? <a href="signup.html">Create one</a></p>
      </section>
    </main>
  </body>
</html>
