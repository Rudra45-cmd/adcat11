<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup — AdCat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="bg-blobs" aria-hidden="true">
      <span class="blob pink"></span>
      <span class="blob blue"></span>
      <span class="blob purple"></span>
    </div>

    <main class="container auth-wrap fade-in">
      <section class="auth-glass">
        <a href="index.html" class="logo">Ad<span>Cat</span></a>
        <h1>Create your account</h1>
        <p class="subtext">Launch your first AI ad workflow in less than 2 minutes.</p>

        <form class="auth-form" action="#" method="post">
          <label>
            Name
            <input type="text" placeholder="Alex Morgan" required />
          </label>

          <label>
            Email
            <input type="email" placeholder="you@company.com" required />
          </label>

          <label>
            Password
            <input type="password" placeholder="Create password" required />
          </label>

          <label>
            Confirm Password
            <input type="password" placeholder="Confirm password" required />
          </label>

          <label class="checkbox">
            <input type="checkbox" required />
            <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy</a>.</span>
          </label>

          <button type="submit" class="btn btn-glass btn-primary btn-block">Signup</button>
          <button type="button" class="btn btn-glass btn-outline btn-block">Sign up with Google</button>
        </form>

        <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
      </section>
    </main>
  </body>
</html>
