<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup — AdCat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container fade-in">
      <aside class="auth-left">
        <span class="shape s1" aria-hidden="true"></span>
        <span class="shape s2" aria-hidden="true"></span>
        <span class="shape s3" aria-hidden="true"></span>

        <div>
          <a href="index.html" class="logo" style="color: #fff">AdCat</a>
        </div>

        <div>
          <h1>Build ads faster with AI</h1>
          <p>Launch high-converting campaigns with premium AI tools designed for growth teams.</p>
        </div>
      </aside>

      <section class="auth-right">
        <form class="glass-form" action="#" method="post">
          <div class="form-head">
            <h2>Create your account</h2>
            <p>Start your free AdCat workspace in under a minute.</p>
          </div>

          <div class="form-grid">
            <div class="row-2">
              <label>
                First Name
                <input type="text" name="first_name" placeholder="Alex" required />
              </label>
              <label>
                Last Name
                <input type="text" name="last_name" placeholder="Morgan" required />
              </label>
            </div>

            <label>
              Email
              <input type="email" name="email" placeholder="you@company.com" required />
            </label>

            <label>
              Password
              <input type="password" name="password" placeholder="Create password" required />
            </label>

            <label>
              Confirm Password
              <input type="password" name="confirm_password" placeholder="Confirm password" required />
            </label>

            <label class="checkbox">
              <input type="checkbox" required />
              <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</span>
            </label>

            <button class="btn btn-primary btn-block" type="submit">Create Account</button>
            <button class="btn social-btn" type="button">Sign up with Google</button>
          </div>

          <p class="helper">Already have an account? <a href="login.html">Log in</a></p>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
